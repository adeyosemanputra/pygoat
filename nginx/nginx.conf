events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;
    
    map $lab $lab_port {
        default 5000;
        xss 5006;
        ssrf 5000;
        xxe 5010;
        template-injection 5015;
        sql-injection 5012;
        software-integrity 5011;
        insecure-design 5008;
        insufficient-logging 5014;
        sde 5100;
        broken-auth 5000;
        broken-access 8080;
        insec-des 8080;
        a9-uckv 9000;
        command-injection 5013;
        crypto-failure 5000;
        sec-misconfig 5009;
        sensitive-data 8000;
        auth-failure 5007;
        bopla 8080;
        business-logic 5010;
        security-headers 5011;
    }
    
    server {
        listen 8000;
        server_name localhost;
        
        client_max_body_size 100M;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        location ~ ^/labs/(?<lab>[^/]+)/static/ {
            set $upstream "${lab}-lab:$lab_port";
            proxy_pass http://$upstream$request_uri;
        }

        location ~ ^/labs/(?<lab>[^/]+)(/.*)?$ {
            set $upstream "${lab}-lab:$lab_port";
            rewrite ^/labs/[^/]+(/.*)$ $1 break;
            rewrite ^/labs/[^/]+$ / break;
            proxy_pass http://$upstream;
        }
        
        location / {
            proxy_pass http://pygoat-web:8000;
        }
    }
}
