name: 🐛 Bug Report
description: Report a bug or broken behaviour in PyGoat
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue quickly.

  - type: dropdown
    id: area
    attributes:
      label: Which part of PyGoat is affected?
      options:
        - Lab / Vulnerability exercise
        - Authentication / Registration
        - Challenge module
        - Docker / Deployment
        - Chatbot (PyGoatBot)
        - UI / Templates
        - Other
    validations:
      required: true

  - type: input
    id: lab
    attributes:
      label: Lab or page name (if applicable)
      description: e.g. "SQL Injection Lab", "A2 – Cryptographic Failures"
      placeholder: Leave blank if not lab-specific

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click / enter '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in the relevant details.
      value: |
        - PyGoat version / commit:
        - Install method: [ ] Docker  [ ] Manual / pip
        - OS:
        - Browser (if UI issue):
        - Python version:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant error output or attach screenshots.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am using a supported install method (Docker or manual).
          required: true
