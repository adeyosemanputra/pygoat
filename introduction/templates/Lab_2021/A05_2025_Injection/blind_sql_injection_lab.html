{% extends 'introduction/base.html' %}
{% block title %}
<title>A05:2025 - Blind SQL Injection Lab</title>
{% endblock %}

{% block content %}
<div style="height: calc(100vh - 120px); width: 100%;">
  <div class="box" style="padding:0; margin-top:0; height:100%; width:100%;">
    <iframe id="blind-sql-iframe" title="Blind SQL Injection Lab" style="width:100%; height:100%; border:none; background:#121212;"></iframe>
  </div>
  <script>
    (function () {
      try {
        var port = window.LAB_BLIND_SQL_INJECTION_PORT || '5023';
        var url = location.protocol + '//' + location.hostname + ':' + port;
        var f = document.getElementById('blind-sql-iframe');
        if (f) f.src = url;
      } catch (e) {
        throw Error;
      }
    })();
  </script>
</div>
{% endblock %}
